name: CI
on: [push, pull_request]

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Node syntax check (all .mjs)
        run: |
          for f in $(find server test -name '*.mjs'); do
            node --check "$f" && echo "OK: $f"
          done
      - name: R syntax check (all .R)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq r-base-core
          for f in r/*.R; do
            Rscript -e "invisible(parse(file=commandArgs(TRUE)[1]))" "$f" && echo "OK: $f"
          done
      - name: Golden tests (skipped without bwrap+data)
        env: { CI: 'true' }
        run: node test/golden.test.mjs
